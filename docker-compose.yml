services:
  server:
    build:
      context: ./server
    container_name: task-manager-server
    environment:
      PORT: 5000
      JWT_SECRET: super-secret-key
      CLIENT_URL: http://localhost:8080
      DB_PATH: /app/storage/data.sqlite
    ports:
      - "5000:5000"
    volumes:
      - server_data:/app/storage

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: task-manager-client
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  server_data:
